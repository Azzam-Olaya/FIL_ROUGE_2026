<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MorLancer | L'Artisanat Digital Marocain</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Manrope:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: "#004824",
            "on-primary": "#ffffff",
            "primary-container": "#006233",
            secondary: "#b71f27",
            "on-secondary": "#ffffff",
            "secondary-container": "#fe5453",
            tertiary: "#735c00",
            surface: "#fff9ea",
            "surface-container": "#f5eed6",
            "on-surface": "#1e1c0d",
            "on-surface-variant": "#3f4940",
            outline: "#6f7a70",
            background: "#fff9ea",
            "error-container": "#ffdad6",
            "on-secondary-fixed-variant": "#930015",
            "surface-dim": "#e1dac3",
            "on-tertiary-container": "#4e3d00",
            "tertiary-container": "#cba72f",
            "on-tertiary-fixed": "#241a00",
            "on-background": "#1e1c0d",
            "surface-bright": "#fff9ea",
            "on-tertiary-fixed-variant": "#574500",
            "on-error": "#ffffff",
            "inverse-surface": "#343121",
            "tertiary-fixed-dim": "#e9c349",
            "on-tertiary": "#ffffff",
            "on-primary-fixed-variant": "#00522a",
            error: "#ba1a1a",
            "primary-fixed-dim": "#86d89d",
            "surface-container-low": "#fbf4db",
            "inverse-on-surface": "#f8f1d8",
            "secondary-fixed-dim": "#ffb3ae",
            "surface-container-lowest": "#ffffff",
            "tertiary-fixed": "#ffe088",
            "on-primary-fixed": "#00210d",
            "on-secondary-container": "#5c0009",
            "inverse-primary": "#86d89d",
            "on-secondary-fixed": "#410004",
            "on-error-container": "#93000a",
            "surface-tint": "#146c3c",
            "primary-fixed": "#a1f5b7",
            "surface-variant": "#e9e2cb",
            "surface-container-high": "#efe8d0",
            "secondary-fixed": "#ffdad7",
            "on-primary-container": "#89dba0",
            "surface-container-highest": "#e9e2cb",
            "outline-variant": "#bfc9be"
          },
          borderRadius: {
            DEFAULT: "1rem",
            lg: "2rem",
            xl: "3rem",
            full: "9999px"
          },
          fontFamily: {
            serif: ["Noto Serif", "serif"],
            sans: ["Manrope", "sans-serif"],
            body: ["Work Sans", "sans-serif"],
            label: ["Work Sans", "sans-serif"],
            display: ["Noto Serif", "serif"]
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply bg-surface text-on-surface min-h-screen zellige-pattern;
        font-family: "Manrope", sans-serif;
      }
      h1, h2, h3, h4, .font-serif {
        font-family: "Noto Serif", serif;
      }
    }

    .zellige-pattern {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l15 15-15 15-15-15L30 0zm0 30l15 15-15 15-15-15 15-15z' fill='%23006241' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
    }

    .neo-artisan-card {
      border: 1px solid rgba(0, 98, 65, 0.1);
      background: #ffffff;
      @apply shadow-sm transition-all duration-300;
    }

    .neo-artisan-card:hover {
      @apply shadow-xl translate-y-[-4px];
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
